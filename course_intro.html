        <h2>数据库原理及应用</h2>
        <p>本课程讲授关系数据库的基本概念和理论，涵盖数据模型、数据库设计、SQL语言以及常用数据库管理系统的应用，通过实验帮助学生掌握数据库的创建、查询与维护。</p>
    </section>

        <p>本课程介绍构建网页和网络应用的核心技术，包括HTML、CSS、JavaScript以及Web服务器原理，旨在培养学生开发动态、交互式网站的能力。</p>
    </section>
    <section>
        <h2>计算机网络</h2>
        <p>本课程涵盖计算机网络的基本结构与协议，讲解物理层、链路层、网络层等各层次的工作原理，并通过实验了解网络配置与故障分析。</p>
